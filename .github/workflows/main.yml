name: hourly-stock-alert
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
concurrency:
  group: stock-alert
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: state.json
          key: state-${{ github.run_id }}
          restore-keys: state-
      - name: create env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env
      - run: python main.py
